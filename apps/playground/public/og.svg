<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left decorative masonry columns -->
  <g opacity="0.1">
    <rect x="36"  y="50"  width="48" height="130" rx="8" fill="#3b82f6"/>
    <rect x="36"  y="192" width="48" height="80"  rx="8" fill="#60a5fa"/>
    <rect x="36"  y="284" width="48" height="180" rx="8" fill="#2563eb"/>
    <rect x="96"  y="50"  width="48" height="75"  rx="8" fill="#93c5fd"/>
    <rect x="96"  y="137" width="48" height="155" rx="8" fill="#3b82f6"/>
    <rect x="96"  y="304" width="48" height="110" rx="8" fill="#60a5fa"/>
    <rect x="156" y="50"  width="48" height="100" rx="8" fill="#60a5fa"/>
    <rect x="156" y="162" width="48" height="140" rx="8" fill="#2563eb"/>
    <rect x="156" y="314" width="48" height="95"  rx="8" fill="#93c5fd"/>
  </g>

  <!-- Right decorative masonry columns -->
  <g opacity="0.1">
    <rect x="996"  y="50"  width="48" height="90"  rx="8" fill="#60a5fa"/>
    <rect x="996"  y="152" width="48" height="160" rx="8" fill="#2563eb"/>
    <rect x="996"  y="324" width="48" height="100" rx="8" fill="#3b82f6"/>
    <rect x="1056" y="50"  width="48" height="170" rx="8" fill="#3b82f6"/>
    <rect x="1056" y="232" width="48" height="95"  rx="8" fill="#93c5fd"/>
    <rect x="1056" y="339" width="48" height="85"  rx="8" fill="#60a5fa"/>
    <rect x="1116" y="50"  width="48" height="110" rx="8" fill="#93c5fd"/>
    <rect x="1116" y="172" width="48" height="140" rx="8" fill="#60a5fa"/>
    <rect x="1116" y="324" width="48" height="100" rx="8" fill="#2563eb"/>
  </g>

  <!-- Icon mark — 5× scale, horizontally centered (mark is 38px wide → 190px at 5×) -->
  <!-- translate(505, 65): places left edge at x=505 so icon spans 505–695, center=600 -->
  <g transform="translate(505, 65) scale(5)">
    <rect x="0"  y="2"  width="10" height="19" rx="2.5" fill="#2563eb"/>
    <rect x="0"  y="23" width="10" height="11" rx="2.5" fill="#60a5fa"/>
    <rect x="14" y="2"  width="10" height="10" rx="2.5" fill="#93c5fd"/>
    <rect x="14" y="14" width="10" height="20" rx="2.5" fill="#3b82f6"/>
    <rect x="28" y="2"  width="10" height="14" rx="2.5" fill="#60a5fa"/>
    <rect x="28" y="18" width="10" height="16" rx="2.5" fill="#bfdbfe"/>
  </g>

  <!-- Wordmark -->
  <text
    x="600"
    y="338"
    text-anchor="middle"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="78"
    font-weight="700"
    letter-spacing="-2"
    fill="#f8fafc"
  >masonix</text>

  <!-- Tagline -->
  <text
    x="600"
    y="392"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="20"
    fill="#94a3b8"
    letter-spacing="0.3"
  >The React masonry layout library that gets the fundamentals right.</text>

  <!-- Feature pills — total width 602px, centered at x=600 (spans 299–901) -->

  <!-- CSS: w=90, x=299 -->
  <rect x="299" y="432" width="90"  height="36" rx="18" fill="#0f2744" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="344" y="455" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="500" fill="#93c5fd">CSS</text>

  <!-- Balanced: w=110, x=403 -->
  <rect x="403" y="432" width="110" height="36" rx="18" fill="#0f2744" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="458" y="455" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="500" fill="#93c5fd">Balanced</text>

  <!-- Virtualized: w=126, x=527 -->
  <rect x="527" y="432" width="126" height="36" rx="18" fill="#0f2744" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="590" y="455" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="500" fill="#93c5fd">Virtualized</text>

  <!-- SSR-ready: w=110, x=667 -->
  <rect x="667" y="432" width="110" height="36" rx="18" fill="#0f2744" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="722" y="455" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="500" fill="#93c5fd">SSR-ready</text>

  <!-- Tailwind: w=110, x=791 -->
  <rect x="791" y="432" width="110" height="36" rx="18" fill="#0f2744" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="846" y="455" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="500" fill="#93c5fd">Tailwind</text>

  <!-- Footer -->
  <text
    x="600"
    y="572"
    text-anchor="middle"
    font-family="ui-monospace, monospace"
    font-size="15"
    fill="#334155"
  >github.com/niteshseram/masonix</text>
</svg>
